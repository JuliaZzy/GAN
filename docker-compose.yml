services:
  enhance:
    build: .
    image: image-enhance:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./weights:/app/weights
      - ./input:/app/input
      - ./output:/app/output

  # One-time setup: download model weights into ./weights/
  setup:
    image: image-enhance:latest
    entrypoint: python
    command: setup_weights.py
    volumes:
      - ./weights:/app/weights
